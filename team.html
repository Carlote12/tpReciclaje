<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deja un mensaje cool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }
        input, textarea {
            padding: 10px;
            width: 300px;
            max-width: 90%;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }
        .btn-enviar {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        .btn-enviar:hover {
            background-color: #45a049;
        }
        .btn-peligro {
            margin-top: 100px;
            padding: 20px 40px;
            font-size: 3em;
            background-color: red;
            color: white;
            border: 4px solid darkred;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0px 5px 10px rgba(0,0,0,0.5);
        }
        .btn-peligro:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    <h1>Hola!!</h1>
    <img src="team (1).jpg" alt="Imagen del equipo">
    
    <h2>¡Deja un mensaje!</h2>
