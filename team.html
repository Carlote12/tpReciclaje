<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deja un mensaje</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            /* Fondo vuelto a la normalidad (cubre toda la pantalla) */
            background: url('download (13).jpg') center/cover fixed;
            color: #333;
        }

        .caja {
            background: rgba(255, 255, 255, 0.85);
            max-width: 500px;
            margin: 10vh auto;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            position: relative;
        }

        .deco {
            position: absolute;
            z-index: 10;
        }

        /* Stickers con tamaños variados para llenar los espacios */
        .gatito { top: -40px; left: -20px; width: 120px; transform: rotate(-10deg); }
        .globostar { top: -30px; right: -30px; width: 70px; transform: rotate(15deg); }
        .floracuarela { bottom: -30px; left: -30px; width: 140px; transform: rotate(-5deg); }
        .munequito { bottom: -20px; right: -10px; width: 60px; }
        .boladisco { top: 40%; right: -50px; width: 90px; }

        form { display: flex; flex-direction: column; gap: 15px; }
        
        input, textarea {
            padding: 12px; width: 100%; box-sizing: border-box;
            border: 2px solid #ffb6c1; border-radius: 10px;
            background: #fff9fa; font-size: 16px;
        }
        
        button {
            padding: 12px; background: #ff69b4; color: white;
            border: none; border-radius: 10px; font-size: 1.1em;
            cursor: pointer; font-weight: bold; width: 100%;
        }
        button:hover { background: #ff1493; }
    </style>
</head>
<body>

    <div class="caja">
        <img src="Gatito.png" class="deco gatito">
        <img src="globostar.png" class="deco globostar">
        <img src="floracuarela.png" class="deco floracuarela">
        <img src="muñequito.png" class="deco munequito">
        <img src="boladisco.png" class="deco boladisco">

        <h1>Hola!!</h1>
        <h2>¡Deja un mensaje!</h2>
        
        <form action="https://formspree.io/f/mbdbowyz" method="POST">
            <input type="text" name="nombre" placeholder="Tu nombre (opcional)">
            <textarea name="mensaje" rows="4" placeholder="Escribe tu mensaje aquí..." required></textarea>
            <button type="submit">Enviar mensaje</button>
        </form>
    </div>

</body>
</html>
