<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objeto: Radiocasete - Guía RAEE</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-image: url('fondocuadrado.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: #333;
        }

        .container {
            max-width: 600px; /* Tamaño ideal para celulares */
            margin: 0 auto;
            padding: 1.5rem 1rem;
        }

        /* Estilo de las tarjetas retro */
        .card {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 4px 4px 0px #333; /* Sombra estilo cómic */
            text-align: center;
        }

        /* Imagen del Radiocasete Daewoo */
        .hero-img {
            width: 100%;
            max-width: 250px;
            border-radius: 8px;
            margin-bottom: 1rem;
            border: 2px solid #333;
        }

        h1 {
            font-size: 2.2rem;
            color: #e84393;
            margin-top: 0;
        }

        h2 {
            font-size: 1.4rem;
            color: #0984e3;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* Íconos decorativos */
        .icon-tech {
            width: 50px;
            height: auto;
        }

        .folder-icon {
            width: 40px;
            height: auto;
            vertical-align: middle;
        }

        .options-list {
            text-align: left;
            list-style: none;
            padding: 0;
        }

        .options-list li {
            background: #f1f2f6;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: bold;
        }

        /* Botón volver y acción */
        .btn {
            display: inline-block;
            background-color: #0984e3;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            border: 2px solid #333;
            box-shadow: 2px 2px 0px #333;
            margin-top: 10px;
        }

        .btn-secondary {
            background-color: #edf2f7;
            color: #333;
            margin-top: 15px;
            font-size: 0.9rem;
            padding: 8px 16px;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #333;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="card">
            <h1>¡No me tires!</h1>
            <p>Muchas veces las personas no saben que hacer con sus objetos tecnológicos cuando no andan. Muchas veces los tiran sin aprovecharlos o aunque aun anden!</p>
        </div>

        <div class="card">
            <h2>¿Qué podés hacer conmigo?</h2>
            <ul class="options-list">
                <li>
                    <img src="portafolio (1).png" alt="Carpeta" class="folder-icon">
                    <a href="podeshacer.html" class="btn-link">1. ¡Reutilizar!</a>
                </li>
                <li>
                    <img src="portafolio (1).png" alt="Carpeta" class="folder-icon">
                    2. Donar
                </li>
                <li style="background-color: #ffeaa7; border-color: #fdcb6e;">
                    <img src="portafolioabierto (1).png" alt="Carpeta abierta" class="folder-icon">
                    3. Reciclar
                </li>
            </ul>
        </div>

    </div>

</body>
</html>
